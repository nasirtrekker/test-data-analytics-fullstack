services:
  backend:
    build: ./backend
    ports: ["8000:8000"]
    env_file:
      - .env.development
    volumes:
      - ./sample_videos.csv:/app/sample_videos.csv:ro
      - ./models:/app/models:ro
    environment:
      - APP_DATA_PATH=/app/sample_videos.csv
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports: ["5173:5173"]
    env_file:
      - .env.development
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
