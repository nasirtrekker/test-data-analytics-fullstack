name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort

      - name: Check code style
        run: |
          flake8 backend/app --count --select=E9,F63,F7,F82 --show-source --statistics || true
          black --check backend/app || true
          isort --check-only backend/app || true

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Type check TypeScript
        run: cd frontend && npx tsc --noEmit || true

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for large files
        run: |
          echo "Checking for files larger than 100MB..."
          find . -type f -size +100M | grep -v '.git' || echo "✓ No excessively large files found"
        run: |
          docker build -f backend/Dockerfile -t content-insights-backend:test .

      - name: Build frontend image
        run: |
          docker build -f frontend/Dockerfile -t content-insights-frontend:test .
