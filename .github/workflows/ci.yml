name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e backend[dev]

      - name: Run pytest
        run: |
          cd backend && pytest -v --cov=app --cov-report=term-missing || pytest -v

      - name: Lint with flake8
        run: |
          flake8 backend/app --count --show-source --statistics --exit-zero

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Build frontend
        run: cd frontend && npm run build

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for trailing whitespace
        run: |
          ! git grep -I --line-number '[[:blank:]]$' -- '*.py' '*.ts' '*.tsx' || echo "Warning: trailing whitespace found"

      - name: Check for large files
        run: |
          find . -type f -size +50M | grep -v '.git' || echo "No large files found"

      - name: Build backend image
        run: |
          docker build -f backend/Dockerfile -t content-insights-backend:test .

      - name: Build frontend image
        run: |
          docker build -f frontend/Dockerfile -t content-insights-frontend:test .
