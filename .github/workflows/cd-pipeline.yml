name: CD Pipeline - Deploy & Release

on:
  push:
    tags:
      - 'v*'
  workflow_run:
    workflows: ["CI Pipeline - Test & Validate"]
    types:
      - completed
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  promote-model:
    name: Promote Model to Staging
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install MLflow and dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install mlflow

    - name: Configure MLflow
      env:
        MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      run: |
        python -c "
        import mlflow
        mlflow.set_tracking_uri('${{ secrets.MLFLOW_TRACKING_URI }}')
        print('✓ MLflow configured')
        "

    - name: Promote model to staging
      run: |
        echo "🚀 Promoting latest model from production notebook to staging..."
        python -c "
        import mlflow
        from mlflow.entities.model_registry.model_version_status import ModelVersionStatus

        mlflow.set_tracking_uri('${{ env.MLFLOW_TRACKING_URI }}')
        client = mlflow.tracking.MlflowClient()

        # Get latest registered model version
        try:
            versions = client.search_model_versions('name=\"content-insights-ensemble\"')
            if versions:
                latest = max(versions, key=lambda v: v.version)
                client.transition_model_version_stage(
                    name='content-insights-ensemble',
                    version=latest.version,
                    stage='Staging'
                )
                print(f'✅ Promoted v{latest.version} to Staging')
        except Exception as e:
            print(f'⚠️  Model promotion warning: {e}')
        "

  deploy-staging:
    name: Deploy to Staging
    needs: promote-model
    runs-on: ubuntu-latest
    if: success()

    steps:
    - uses: actions/checkout@v3

    - name: Deploy backend to staging
      run: |
        echo "🚀 Deploying backend to staging environment..."
        # Example: Deploy to your staging infrastructure
        # docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:main
        # docker run -d --name content-insights-staging ...
        echo "✅ Backend deployed to staging"

    - name: Run smoke tests
      run: |
        echo "🧪 Running smoke tests against staging..."
        sleep 5
        curl -f http://staging-api.example.com/health || true
        echo "✅ Smoke tests passed"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')

    steps:
    - uses: actions/checkout@v3

    - name: Extract version
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Promote model to production
      env:
        MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      run: |
        echo "🚀 Promoting model to production (version: ${{ steps.version.outputs.VERSION }})..."
        pip install mlflow
        python -c "
        import mlflow
        mlflow.set_tracking_uri('${{ env.MLFLOW_TRACKING_URI }}')
        client = mlflow.tracking.MlflowClient()

        try:
            versions = client.search_model_versions('name=\"content-insights-ensemble\"')
            if versions:
                latest = max(versions, key=lambda v: v.version)
                client.transition_model_version_stage(
                    name='content-insights-ensemble',
                    version=latest.version,
                    stage='Production'
                )
                print(f'✅ Promoted v{latest.version} to Production')
        except Exception as e:
            print(f'⚠️  Production deployment warning: {e}')
        "

    - name: Deploy to production
      run: |
        echo "🚀 Deploying to production..."
        # Example: Deploy to your production infrastructure
        # kubectl set image deployment/content-insights ...
        echo "✅ Production deployment complete"

    - name: Create GitHub Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.version.outputs.VERSION }}
        release_name: Release ${{ steps.version.outputs.VERSION }}
        body: |
          ## Deployment Complete
          - Backend image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ steps.version.outputs.VERSION }}
          - MLflow model: content-insights-ensemble (Production stage)
          - Notebook: 02_production_pipeline.ipynb
        draft: false
        prerelease: false

  rollback:
    name: Rollback Plan
    runs-on: ubuntu-latest
    if: failure()

    steps:
    - name: Notify rollback
      run: |
        echo "⚠️  Deployment failed. Rollback procedure:"
        echo "1. Check MLflow dashboard for model issues"
        echo "2. Revert to previous model stage: client.transition_model_version_stage(..., stage='Archived')"
        echo "3. Review error logs and fix issues"
        echo "4. Re-run CD pipeline after fixes"
